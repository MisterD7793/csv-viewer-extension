<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4ade80;
      --accent-dim: #166534;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --header-bg: #161923;
      --row-hover: #1e2133;
      --tag-bg: #1e2d1e;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #topbar .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #topbar .filename {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      min-width: 220px;
    }

    #search-wrap svg { color: var(--text-muted); flex-shrink: 0; }

    #search {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      width: 100%;
    }
    #search::placeholder { color: var(--text-muted); }

    .stat-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      white-space: nowrap;
    }

    #download-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      padding: 6px 14px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #download-btn:hover { background: #14532d; }

    #status {
      padding: 48px 24px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #table-wrap {
      flex: 1;
      overflow: auto;
      padding: 0 0 40px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead tr { background: var(--header-bg); position: sticky; top: 0; }

    th {
      padding: 10px 16px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--accent); }
    th.sorted-asc .sort-arrow::after { content: ' ↑'; color: var(--accent); }
    th.sorted-desc .sort-arrow::after { content: ' ↓'; color: var(--accent); }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: 9px 16px;
      color: var(--text);
      vertical-align: top;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td.empty { color: var(--text-muted); font-style: italic; }

    mark { background: #854d0e; color: #fde68a; border-radius: 2px; padding: 0 2px; }

    #no-results {
      display: none;
      padding: 48px;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="topbar">
  <span class="logo">◈ CSV VIEWER</span>
  <span class="filename" id="filename">—</span>
  <div id="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Filter rows…" autocomplete="off" />
  </div>
  <span class="stat-pill" id="row-count">— rows</span>
  <button id="download-btn">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download CSV
  </button>
</div>

<div id="status"><span class="spinner"></span> Loading…</div>
<div id="table-wrap" style="display:none">
  <table id="csv-table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-results">No rows match your filter.</div>
</div>

<script src="viewer.js"></script>
</body>
</html>
