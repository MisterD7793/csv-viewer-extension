<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 240px;
      padding: 16px;
      background: #0f1117;
      color: #e2e8f0;
    }
    h3 { font-size: 13px; font-weight: 600; color: #4ade80; margin-bottom: 8px; letter-spacing: 0.04em; }
    p { font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 12px; }
    a.settings-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
      text-decoration: none;
      padding: 8px 10px;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
    }
    a.settings-btn:hover { color: #4ade80; border-color: #166534; }
  </style>
</head>
<body>
  <h3>◈ CSV Roster Viewer</h3>
  <p>CSV downloads on allowed domains are automatically opened as a table.</p>
  <a class="settings-btn" id="settings-link" href="#">
    ⚙ Manage allowed domains
  </a>
  <script src="popup.js"></script>
</body>
</html>
